name: Generate Snapshots

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate snapshots
        run: node tools/generate-all-snapshots.mjs
        env:
          APIFOOTBALL_KEY: ${{ secrets.APIFOOTBALL_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Smoke test (local)
        run: node tools/smoke-test-snapshots.mjs
        env:
          R2_BASE_URL: https://radartips-data.m2otta-music.workers.dev/v1

      - name: Summary
        run: |
          echo "Snapshots generation completed."
          echo "Manifest: data/v1/manifest.json"
