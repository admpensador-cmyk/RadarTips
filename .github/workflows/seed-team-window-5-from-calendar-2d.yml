name: Seed team-window-5 from calendar_2d

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: read

concurrency:
  group: seed-team-window-5-from-calendar-2d
  cancel-in-progress: true

jobs:
  seed:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Resolve API key env
        run: |
          set -euo pipefail
          if [[ -n "${API_FOOTBALL_KEY:-}" ]]; then
            echo "APIFOOTBALL_KEY=${API_FOOTBALL_KEY}" >> "$GITHUB_ENV"
          elif [[ -n "${APIFOOTBALL_KEY:-}" ]]; then
            echo "APIFOOTBALL_KEY=${APIFOOTBALL_KEY}" >> "$GITHUB_ENV"
          else
            echo "❌ Missing API football secret. Configure API_FOOTBALL_KEY or APIFOOTBALL_KEY."
            exit 1
          fi
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          APIFOOTBALL_KEY: ${{ secrets.APIFOOTBALL_KEY }}

      - name: Validate Cloudflare secrets
        run: |
          set -euo pipefail
          if [[ -z "${CLOUDFLARE_API_TOKEN:-}" || -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]]; then
            echo "❌ Missing Cloudflare secrets. Configure CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID."
            exit 1
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Seed team-window-5 from calendar_2d
        env:
          APIFOOTBALL_KEY: ${{ env.APIFOOTBALL_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          set -euo pipefail
          node tools/seed-team-window-5-from-calendar-2d.mjs --max-fixtures 40

      - name: Post-seed healthcheck
        run: |
          set -euo pipefail
          node tools/healthcheck-match-stats.mjs
