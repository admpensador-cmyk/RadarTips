name: Update Competition Extras (Standings + Stats)

on:
  workflow_dispatch: {}
  schedule:
    - cron: "30 11 * * *" # 08:30 BRT (UTC-3) ~= 11:30 UTC (after daily snapshot)

permissions:
  contents: write

concurrency:
  group: radartips-competition-extras
  cancel-in-progress: true

jobs:
  build-competition-extras:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate Competition Standings + Stats (API-FOOTBALL)
        env:
          APIFOOTBALL_KEY: ${{ secrets.APIFOOTBALL_KEY }}
        run: |
          set -euo pipefail
          node tools/update-competition-extras-batch.mjs

      - name: List generated files
        run: |
          ls -lh data/v1/standings_*.json data/v1/compstats_*.json 2>/dev/null || echo "No files generated yet"

      - name: Upload standings + stats to R2 (optional)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          set -euo pipefail

          if [[ -z "${CLOUDFLARE_API_TOKEN:-}" || -z "${CLOUDFLARE_ACCOUNT_ID:-}" || -z "${R2_BUCKET_NAME:-}" ]]; then
            echo "Skipping R2 upload (missing Cloudflare secrets)."
            exit 0
          fi

          echo "R2_BUCKET_NAME=${R2_BUCKET_NAME}"

          npm i -g wrangler@4.62.0
          wrangler --version

          # Find and upload all standings + compstats files
          echo "=== PUT (REMOTE) ==="
          for file in data/v1/standings_*.json data/v1/compstats_*.json; do
            if [[ -f "$file" ]]; then
              basename=$(basename "$file")
              echo "Uploading $basename..."
              wrangler r2 object put --remote "${R2_BUCKET_NAME}/v1/${basename}" \
                --file "$file" \
                --content-type "application/json"
            fi
          done

          echo "=== GET (REMOTE) + verify ==="
          for file in data/v1/standings_*.json data/v1/compstats_*.json; do
            if [[ -f "$file" ]]; then
              basename=$(basename "$file")
              echo "Verifying $basename..."
              wrangler r2 object get --remote "${R2_BUCKET_NAME}/v1/${basename}" --file "/tmp/verify_${basename}"
              sha256sum "$file" "/tmp/verify_${basename}"
            fi
          done

          echo "Uploaded to R2 OK."

      - name: Commit if changes were made
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet data/v1/standings_*.json data/v1/compstats_*.json 2>/dev/null; then
            echo "No changes to commit."
            exit 0
          fi

          git add data/v1/standings_*.json data/v1/compstats_*.json 2>/dev/null || true
          git diff --cached --quiet || {
            git commit -m "chore: update competition standings + stats snapshots"
            git push origin main
          }

          echo "Committed and pushed."
