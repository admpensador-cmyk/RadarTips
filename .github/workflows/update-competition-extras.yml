name: Update Competition Extras (Standings + Stats)

on:
  workflow_dispatch: {}
  schedule:
    - cron: "30 11 * * *" # 08:30 BRT (UTC-3) ~= 11:30 UTC (after daily snapshot)

permissions:
  contents: write

concurrency:
  group: radartips-competition-extras
  cancel-in-progress: true

jobs:
  build-competition-extras:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate Competition Standings + Stats (API-FOOTBALL)
        env:
          APIFOOTBALL_KEY: ${{ secrets.APIFOOTBALL_KEY }}
        run: |
          set -euo pipefail
          
          echo "========================================"
          echo "UPDATE COMPETITION EXTRAS (ALL LEAGUES)"
          echo "========================================"
          echo ""
          echo "Batch updating all leagues from calendar_7d.json..."
          echo "Using deterministic season resolution via /leagues API..."
          echo ""
          
          node tools/update-competition-extras-batch-v2.mjs
          
          echo ""
          echo "========================================"
          echo "GENERATION COMPLETE"
          echo "========================================"

      - name: List generated files
        run: |
          echo "════════════════════════════════════════════"
          echo "GENERATED FILES"
          echo "════════════════════════════════════════════"
          
          echo ""
          echo "Standings Files:"
          ls -lh data/v1/standings_*.json 2>/dev/null || echo "  (none)"
          
          echo ""
          echo "Compstats Files:"
          ls -lh data/v1/compstats_*.json 2>/dev/null || echo "  (none)"
          
          echo ""
          echo "Summary:"
          STANDINGS_COUNT=$(ls -1 data/v1/standings_*.json 2>/dev/null | wc -l)
          COMPSTATS_COUNT=$(ls -1 data/v1/compstats_*.json 2>/dev/null | wc -l)
          echo "  Standings: ${STANDINGS_COUNT} files"
          echo "  Compstats: ${COMPSTATS_COUNT} files"
          echo ""

      - name: Build manifest (reference only existing files)
        run: node tools/build-manifest.mjs

      - name: Audit manifest (verify no orphaned references)
        run: |
          echo "Auditing manifest for orphaned file references..."
          node tools/audit-manifest-v1.mjs
          if [[ $? -ne 0 ]]; then
            echo ""
            echo "❌ AUDIT FAILED: Manifest references non-existent files"
            echo "   This must be fixed before upload."
            exit 1
          fi

      - name: Upload standings + stats to R2 (optional)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          # Create a Node.js script to upload to R2 using Cloudflare API directly
          cat > /tmp/upload-r2.mjs << 'UPLOAD_SCRIPT'
          import fs from 'fs';
          import path from 'path';
          import { fileURLToPath } from 'url';
          
          const __dirname = path.dirname(fileURLToPath(import.meta.url));
          
          const token = process.env.CLOUDFLARE_API_TOKEN;
          const accountId = process.env.CLOUDFLARE_ACCOUNT_ID;
          const bucketName = process.env.R2_BUCKET_NAME;
          
          if (!token || !accountId || !bucketName) {
            console.log('⚠️  Skipping R2 upload (missing Cloudflare secrets)');
            process.exit(0);
          }
          
          console.log('════════════════════════════════════════════');
          console.log('R2 UPLOAD');
          console.log('════════════════════════════════════════════');
          console.log(`Bucket: ${bucketName}`);
          console.log('');
          
          const uploadFile = async (filePath, remoteKey) => {
            try {
              const fileContent = fs.readFileSync(filePath);
              const response = await fetch(
                `https://${accountId}.r2.cloudflarestorage.com/${bucketName}/${remoteKey}`,
                {
                  method: 'PUT',
                  headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json',
                  },
                  body: fileContent,
                }
              );
              
              if (!response.ok) {
                const text = await response.text();
                console.log(`  ❌ ${path.basename(filePath)} (${response.status})`);
                console.log(`     Error: ${text.substring(0, 100)}`);
                return false;
              }
              console.log(`  ✅ ${path.basename(filePath)}`);
              return true;
            } catch (err) {
              console.log(`  ❌ ${path.basename(filePath)} (${err.message})`);
              return false;
            }
          };
          
          (async () => {
            let uploadCount = 0;
            let failCount = 0;
            
            // Upload standings files
            console.log('Uploading standings files...');
            const standingsFiles = fs.readdirSync('.').filter(f => f.startsWith('standings_') && f.endsWith('.json'));
            for (const file of standingsFiles) {
              if (await uploadFile(file, `v1/${file}`)) {
                uploadCount++;
              } else {
                failCount++;
              }
            }
            
            // Upload compstats files
            console.log('');
            console.log('Uploading compstats files...');
            const compstatsFiles = fs.readdirSync('.').filter(f => f.startsWith('compstats_') && f.endsWith('.json'));
            for (const file of compstatsFiles) {
              if (await uploadFile(file, `v1/${file}`)) {
                uploadCount++;
              } else {
                failCount++;
              }
            }
            
            // Upload manifest
            console.log('');
            console.log('Uploading manifest...');
            if (fs.existsSync('manifest.json')) {
              if (await uploadFile('manifest.json', 'v1/manifest.json')) {
                uploadCount++;
              } else {
                failCount++;
              }
            }
            
            console.log('');
            console.log('════════════════════════════════════════════');
            console.log(`Upload Summary: ${uploadCount} OK, ${failCount} FAILED`);
            console.log('════════════════════════════════════════════');
            console.log('');
            
            if (failCount > 0) {
              console.log(`⚠️  ${failCount} file(s) failed to upload`);
              process.exit(1);
            } else {
              console.log('✅ All files uploaded successfully');
            }
          })();
          UPLOAD_SCRIPT
          
          # Run from data/v1 directory where files are
          cd data/v1
          node /tmp/upload-r2.mjs

      - name: Commit if changes were made
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Check for changes in standings, compstats, and manifest
          if git diff --quiet data/v1/standings_*.json data/v1/compstats_*.json data/v1/manifest.json 2>/dev/null; then
            echo "No changes to commit."
            exit 0
          fi

          # Add all generated snapshots and manifest
          git add data/v1/standings_*.json 2>/dev/null || true
          git add data/v1/compstats_*.json 2>/dev/null || true
          git add data/v1/manifest.json 2>/dev/null || true
          
          # Only commit if there are staged changes
          git diff --cached --quiet || {
            git commit -m "chore: update competition standings + stats snapshots & manifest"
            git push origin main
          }

          echo "Committed and pushed."
