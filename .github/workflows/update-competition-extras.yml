name: Update Competition Extras (Standings + Stats)

on:
  workflow_dispatch:
    inputs:
      do_commit:
        description: "Commit and push generated files"
        required: false
        default: "false"
  schedule:
    - cron: "30 11 * * *" # 08:30 BRT (UTC-3) ~= 11:30 UTC (after daily snapshot)

permissions:
  contents: write

concurrency:
  group: radartips-competition-extras
  cancel-in-progress: true

jobs:
  build-competition-extras:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate Competition Standings + Stats (API-FOOTBALL)
        env:
          APIFOOTBALL_KEY: ${{ secrets.APIFOOTBALL_KEY }}
        run: |
          set -euo pipefail
          
          echo "========================================"
          echo "UPDATE COMPETITION EXTRAS (ALL LEAGUES)"
          echo "========================================"
          echo ""
          echo "Batch updating all leagues from calendar_7d.json..."
          echo "Using deterministic season resolution via /leagues API..."
          echo ""
          
          node tools/update-competition-extras-batch-v2.mjs
          
          echo ""
          echo "========================================"
          echo "GENERATION COMPLETE"
          echo "========================================"

      - name: List generated files
        run: |
          echo "════════════════════════════════════════════"
          echo "GENERATED FILES"
          echo "════════════════════════════════════════════"
          
          echo ""
          echo "Standings Files:"
          ls -lh data/v1/standings_*.json 2>/dev/null || echo "  (none)"
          
          echo ""
          echo "Compstats Files:"
          ls -lh data/v1/compstats_*.json 2>/dev/null || echo "  (none)"
          
          echo ""
          echo "Summary:"
          STANDINGS_COUNT=$(ls -1 data/v1/standings_*.json 2>/dev/null | wc -l)
          COMPSTATS_COUNT=$(ls -1 data/v1/compstats_*.json 2>/dev/null | wc -l)
          echo "  Standings: ${STANDINGS_COUNT} files"
          echo "  Compstats: ${COMPSTATS_COUNT} files"
          echo ""

      - name: Build manifest (reference only existing files)
        run: node tools/build-manifest.mjs

      - name: Validate manifest vs filesystem
        run: node tools/validate-manifest-files.mjs

      - name: Smoke test snapshots (local)
        run: node tools/smoke-test-snapshots.mjs

      - name: Upload standings + stats + manifest to R2 (optional)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          set -euo pipefail

          if [[ -z "${CLOUDFLARE_API_TOKEN:-}" || -z "${CLOUDFLARE_ACCOUNT_ID:-}" || -z "${R2_BUCKET_NAME:-}" ]]; then
            echo "Skipping R2 upload (missing Cloudflare secrets)."
            exit 0
          fi

          npx -y wrangler@4.62.0 --version

          test -f "data/v1/manifest.json"

          shopt -s nullglob
          files=(data/v1/standings_*.json data/v1/compstats_*.json)

          echo "Uploading manifest.json..."
          npx -y wrangler@4.62.0 r2 object put --remote "${R2_BUCKET_NAME}/v1/manifest.json" \
            --file "data/v1/manifest.json" \
            --content-type "application/json"

          uploaded=1
          for file in "${files[@]}"; do
            filename="$(basename "${file}")"
            echo "Uploading ${filename}..."
            npx -y wrangler@4.62.0 r2 object put --remote "${R2_BUCKET_NAME}/v1/${filename}" \
              --file "${file}" \
              --content-type "application/json"
            uploaded=$((uploaded + 1))
          done

          echo "✅ Uploaded ${uploaded} file(s) to R2 via Wrangler"

      - name: Verify R2 objects (HTTP)
        run: |
          set -euo pipefail
          BASE="https://radartips-data.m2otta-music.workers.dev/v1"

          echo "Checking: $BASE/manifest.json"
          MANIFEST_STATUS=$(curl -sS -o /tmp/manifest.json -w "%{http_code}" "$BASE/manifest.json")
          if [[ "$MANIFEST_STATUS" != "200" ]]; then
            echo "❌ Manifest returned HTTP $MANIFEST_STATUS"
            exit 1
          fi
          echo "✅ Manifest OK (HTTP 200)"
          echo "First entries:"
          node -e "const m=require('/tmp/manifest.json');console.log(JSON.stringify(m.entries.slice(0,3),null,2))"
          echo

          # Get first entry from manifest to test
          FIRST_LEAGUE=$(node -e "const m=require('/tmp/manifest.json');if(m.entries[0])console.log(m.entries[0].leagueId)")
          FIRST_SEASON=$(node -e "const m=require('/tmp/manifest.json');if(m.entries[0])console.log(m.entries[0].season)")
          
          if [[ -z "$FIRST_LEAGUE" || -z "$FIRST_SEASON" ]]; then
            echo "❌ Manifest has no entries"
            exit 1
          fi

          echo "Testing standings for league ${FIRST_LEAGUE}, season ${FIRST_SEASON}..."
          STANDINGS_FILE="standings_${FIRST_LEAGUE}_${FIRST_SEASON}.json"
          STANDINGS_STATUS=$(curl -sS -o /tmp/test_standings.json -w "%{http_code}" "$BASE/$STANDINGS_FILE")
          if [[ "$STANDINGS_STATUS" != "200" ]]; then
            echo "❌ Standings returned HTTP $STANDINGS_STATUS"
            exit 1
          fi
          echo "✅ Standings OK (HTTP 200)"
          echo

          echo "✅ Verify OK"

      - name: Commit if changes were made
        if: ${{ inputs.do_commit == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Check for changes in standings, compstats, and manifest
          if git diff --quiet data/v1/standings_*.json data/v1/compstats_*.json data/v1/manifest.json 2>/dev/null; then
            echo "No changes to commit."
            exit 0
          fi

          # Add all generated snapshots and manifest
          git add data/v1/standings_*.json 2>/dev/null || true
          git add data/v1/compstats_*.json 2>/dev/null || true
          git add data/v1/manifest.json 2>/dev/null || true
          
          # Only commit if there are staged changes
          git diff --cached --quiet || {
            git commit -m "chore: update competition standings + stats snapshots & manifest"
            git push origin main
          }

          echo "Committed and pushed."
