name: Update Competition Extras (Standings + Stats)

on:
  workflow_dispatch: {}
  schedule:
    - cron: "30 11 * * *" # 08:30 BRT (UTC-3) ~= 11:30 UTC (after daily snapshot)

permissions:
  contents: write

concurrency:
  group: radartips-competition-extras
  cancel-in-progress: true

jobs:
  build-competition-extras:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate Competition Standings + Stats (API-FOOTBALL)
        env:
          APIFOOTBALL_KEY: ${{ secrets.APIFOOTBALL_KEY }}
        run: |
          set -euo pipefail
          
          echo "========================================"
          echo "UPDATE COMPETITION EXTRAS (ALL LEAGUES)"
          echo "========================================"
          echo ""
          echo "Batch updating all leagues from calendar_7d.json..."
          echo "Using deterministic season resolution via /leagues API..."
          echo ""
          
          node tools/update-competition-extras-batch-v2.mjs
          
          echo ""
          echo "========================================"
          echo "GENERATION COMPLETE"
          echo "========================================"

      - name: List generated files
        run: |
          echo "════════════════════════════════════════════"
          echo "GENERATED FILES"
          echo "════════════════════════════════════════════"
          
          echo ""
          echo "Standings Files:"
          ls -lh data/v1/standings_*.json 2>/dev/null || echo "  (none)"
          
          echo ""
          echo "Compstats Files:"
          ls -lh data/v1/compstats_*.json 2>/dev/null || echo "  (none)"
          
          echo ""
          echo "Summary:"
          STANDINGS_COUNT=$(ls -1 data/v1/standings_*.json 2>/dev/null | wc -l)
          COMPSTATS_COUNT=$(ls -1 data/v1/compstats_*.json 2>/dev/null | wc -l)
          echo "  Standings: ${STANDINGS_COUNT} files"
          echo "  Compstats: ${COMPSTATS_COUNT} files"
          echo ""

      - name: Build manifest (reference only existing files)
        run: node tools/build-manifest.mjs

      - name: Audit manifest (verify no orphaned references)
        run: |
          echo "Auditing manifest for orphaned file references..."
          node tools/audit-manifest-v1.mjs
          if [[ $? -ne 0 ]]; then
            echo ""
            echo "❌ AUDIT FAILED: Manifest references non-existent files"
            echo "   This must be fixed before upload."
            exit 1
          fi

      - name: Upload standings + stats to R2 (optional)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          set -euo pipefail

          echo "════════════════════════════════════════════"
          echo "R2 UPLOAD"
          echo "════════════════════════════════════════════"

          if [[ -z "${CLOUDFLARE_API_TOKEN:-}" || -z "${CLOUDFLARE_ACCOUNT_ID:-}" || -z "${R2_BUCKET_NAME:-}" ]]; then
            echo "⚠️  Skipping R2 upload (missing Cloudflare secrets)"
            exit 0
          fi

          echo "Bucket: ${R2_BUCKET_NAME}"
          echo ""

          # Install wrangler with full error reporting
          echo "Installing wrangler 4.62.0..."
          if ! npm install -g wrangler@4.62.0; then
            echo "❌ FATAL: Failed to install wrangler"
            exit 1
          fi
          echo "✓ wrangler installed"
          echo ""

          UPLOAD_COUNT=0
          FAIL_COUNT=0

          # Upload all standings files
          echo "Uploading standings files..."
          for file in data/v1/standings_*.json; do
            if [[ -f "$file" ]]; then
              basename=$(basename "$file")
              if wrangler r2 object put --remote "${R2_BUCKET_NAME}/v1/${basename}" \
                --file "$file" \
                --content-type "application/json" 2>/dev/null; then
                echo "  ✅ ${basename}"
                ((UPLOAD_COUNT++))
              else
                echo "  ❌ ${basename}"
                ((FAIL_COUNT++))
              fi
            fi
          done

          # Upload all compstats files
          echo ""
          echo "Uploading compstats files..."
          for file in data/v1/compstats_*.json; do
            if [[ -f "$file" ]]; then
              basename=$(basename "$file")
              if wrangler r2 object put --remote "${R2_BUCKET_NAME}/v1/${basename}" \
                --file "$file" \
                --content-type "application/json" 2>/dev/null; then
                echo "  ✅ ${basename}"
                ((UPLOAD_COUNT++))
              else
                echo "  ❌ ${basename}"
                ((FAIL_COUNT++))
              fi
            fi
          done

          # Upload manifest (source of truth for frontend)
          echo ""
          echo "Uploading manifest..."
          if [[ -f "data/v1/manifest.json" ]]; then
            if wrangler r2 object put --remote "${R2_BUCKET_NAME}/v1/manifest.json" \
              --file "data/v1/manifest.json" \
              --content-type "application/json" 2>/dev/null; then
              echo "  ✅ manifest.json"
              ((UPLOAD_COUNT++))
            else
              echo "  ❌ manifest.json"
              ((FAIL_COUNT++))
            fi
          fi

          echo ""
          echo "════════════════════════════════════════════"
          echo "Upload Summary: ${UPLOAD_COUNT} OK, ${FAIL_COUNT} FAILED"
          echo "════════════════════════════════════════════"
          echo ""

          if [[ ${FAIL_COUNT} -gt 0 ]]; then
            echo "⚠️  Some files failed to upload (${FAIL_COUNT} failures)"
            exit 1
          else
            echo "✅ All files uploaded successfully"
          fi

      - name: Commit if changes were made
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Check for changes in standings, compstats, and manifest
          if git diff --quiet data/v1/standings_*.json data/v1/compstats_*.json data/v1/manifest.json 2>/dev/null; then
            echo "No changes to commit."
            exit 0
          fi

          # Add all generated snapshots and manifest
          git add data/v1/standings_*.json 2>/dev/null || true
          git add data/v1/compstats_*.json 2>/dev/null || true
          git add data/v1/manifest.json 2>/dev/null || true
          
          # Only commit if there are staged changes
          git diff --cached --quiet || {
            git commit -m "chore: update competition standings + stats snapshots & manifest"
            git push origin main
          }

          echo "Committed and pushed."
