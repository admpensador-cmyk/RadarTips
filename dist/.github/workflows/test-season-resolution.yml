name: Test Season Resolution V2

on:
  workflow_dispatch:  # Manual trigger only
  
permissions:
  contents: read

jobs:
  test-season-resolution:
    name: Validate Season Resolution (V2)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify Node version
        run: |
          echo "Node version:"
          node -v
          echo ""
          echo "NPM version:"
          npm -v

      - name: Verify API Key (safe check - no logging of key value)
        run: |
          if [ -z "$APIFOOTBALL_KEY" ]; then
            echo "❌ APIFOOTBALL_KEY is NOT set"
            exit 1
          else
            echo "✅ APIFOOTBALL_KEY is present"
            echo "   Length: ${#APIFOOTBALL_KEY} characters"
            echo ""
          fi
        env:
          APIFOOTBALL_KEY: ${{ secrets.APIFOOTBALL_KEY }}

      - name: Run Season Resolution Tests
        run: node tools/test-season-resolution.mjs
        env:
          APIFOOTBALL_KEY: ${{ secrets.APIFOOTBALL_KEY }}

      - name: Validate League 40 (Championship) Specifically
        run: |
          echo "=========================================="
          echo "VALIDATING LEAGUE 40 (CHAMPIONSHIP)"
          echo "=========================================="
          echo ""
          
          node -e "
            const { resolveSeasonForLeague } = await import('./tools/lib/season-from-leagues.mjs');
            
            try {
              console.log('Resolving season for league 40...');
              const result = await resolveSeasonForLeague({ leagueId: 40 });
              
              console.log('');
              console.log('✅ RESOLUTION SUCCESS:');
              console.log('   leagueId: 40');
              console.log('   season: ' + result.year);
              console.log('   seasonSource: ' + result.reason);
              console.log('   type: ' + result.leagueMeta.type);
              console.log('   coverage.standings: ' + result.coverage.standings);
              console.log('');
              
              if (result.leagueMeta.type === 'league' && result.coverage.standings === true) {
                console.log('✅ League 40 is configured as LEAGUE with standings coverage');
              } else {
                console.log('⚠️  Unexpected configuration for league 40');
              }
            } catch (err) {
              console.error('❌ RESOLUTION FAILED:');
              console.error('   Error: ' + err.message);
              process.exit(1);
            }
          "
        env:
          APIFOOTBALL_KEY: ${{ secrets.APIFOOTBALL_KEY }}

      - name: Summary
        if: success()
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════╗"
          echo "║ ✅ SEASON RESOLUTION V2 VALIDATION COMPLETE   ║"
          echo "╚════════════════════════════════════════════════╝"
          echo ""
          echo "📊 What was tested:"
          echo "  • API endpoint: https://v3.football.api-sports.io"
          echo "  • Season resolution via /leagues endpoint"
          echo "  • All 5 test leagues (39, 40, 2, 848, 71)"
          echo "  • Specific validation for league 40 (Championship)"
          echo "  • Coverage detection (standings vs cup)"
          echo ""
          echo "🔍 Key validations:"
          echo "  ✓ /leagues?id=<leagueId> returns seasons[]"
          echo "  ✓ season.current is prioritized when available"
          echo "  ✓ type (league vs cup) is correctly determined"
          echo "  ✓ coverage.standings boolean is respected"
          echo ""

      - name: Failure Summary
        if: failure()
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════╗"
          echo "║ ❌ VALIDATION FAILED                           ║"
          echo "╚════════════════════════════════════════════════╝"
          echo ""
          echo "Check the logs above for details"
          echo ""
