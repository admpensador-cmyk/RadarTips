<?xml version="1.0" encoding="UTF-8"?>
<!-- RadarTips logo for dark UI (navy tile, light wordmark) -->
<svg xmlns="http://www.w3.org/2000/svg" width="360" height="220" viewBox="0 0 360 220" fill="none" aria-labelledby="rtLogoTitleD" role="img">
  <title id="rtLogoTitleD">RadarTips</title>
  <defs>
    <linearGradient id="rtRGradD" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E4A8C"/>
      <stop offset="45%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#7DD3FC"/>
    </linearGradient>
    <filter id="rtRShadeD" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="360" height="220" rx="12" fill="#0B1220"/>

  <g transform="translate(118, 28)" filter="url(#rtRShadeD)">
    <path
      fill="url(#rtRGradD)"
      d="M 32 8
         L 32 104
         L 50 104
         L 50 72
         L 54 72
         L 82 104
         L 102 104
         L 68 68
         C 82 64 92 48 92 32
         C 92 20 80 8 60 8
         L 32 8
         Z"/>

    <g transform="translate(94, 94)">
      <circle cx="0" cy="0" r="10" fill="#ECECEC" stroke="#050505" stroke-width="1.1"/>
      <path d="M 0 -5.2 L 4.9 -1.6 L 3 4.2 L -3 4.2 L -4.9 -1.6 Z" fill="#050505"/>
      <path d="M -8 2 L 8 -2" stroke="#050505" stroke-width="0.65" stroke-linecap="square"/>
      <path d="M -6 -4 L 6 4" stroke="#050505" stroke-width="0.45" opacity="0.55"/>
      <path d="M 0 -9.5 A 9.5 9.5 0 0 1 0 9.5" fill="none" stroke="#050505" stroke-width="0.5" opacity="0.45"/>
    </g>
  </g>

  <text
    x="180"
    y="188"
    text-anchor="middle"
    font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
    font-size="25"
    font-weight="600"
    letter-spacing="0.06em"
    fill="#E8EEF8">
    RadarTips
  </text>
</svg>
