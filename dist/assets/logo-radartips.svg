<?xml version="1.0" encoding="UTF-8"?>
<!--
  RadarTips — logo principal (fundo transparente, texto escuro).
  Dev: abra no navegador ou sirva via /assets/logo-radartips.svg
-->
<svg xmlns="http://www.w3.org/2000/svg" width="360" height="220" viewBox="0 0 360 220" fill="none" aria-labelledby="rtLogoTitle" role="img">
  <title id="rtLogoTitle">RadarTips</title>
  <defs>
    <linearGradient id="rtRGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#153A72"/>
      <stop offset="50%" stop-color="#2B6FD9"/>
      <stop offset="100%" stop-color="#4DB8FF"/>
    </linearGradient>
    <filter id="rtRShade" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2.2" flood-color="#061018" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- Symbol: geometric R + football (baseline y = 104 in local space) -->
  <g transform="translate(118, 28)" filter="url(#rtRShade)">
    <path
      fill="url(#rtRGrad)"
      d="M 32 8
         L 32 104
         L 50 104
         L 50 72
         L 54 72
         L 82 104
         L 102 104
         L 68 68
         C 82 64 92 48 92 32
         C 92 20 80 8 60 8
         L 32 8
         Z"/>

    <!-- Stylized ball: B/W, bottom edge at y=104 (center y=94, r=10) -->
    <g transform="translate(94, 94)">
      <circle cx="0" cy="0" r="10" fill="#F2F2F2" stroke="#0A0A0A" stroke-width="1.1"/>
      <!-- Pentagon + seams -->
      <path d="M 0 -5.2 L 4.9 -1.6 L 3 4.2 L -3 4.2 L -4.9 -1.6 Z" fill="#0A0A0A"/>
      <path d="M -8 2 L 8 -2" stroke="#0A0A0A" stroke-width="0.65" stroke-linecap="square"/>
      <path d="M -6 -4 L 6 4" stroke="#0A0A0A" stroke-width="0.45" opacity="0.55"/>
      <path d="M 0 -9.5 A 9.5 9.5 0 0 1 0 9.5" fill="none" stroke="#0A0A0A" stroke-width="0.5" opacity="0.45"/>
    </g>
  </g>

  <text
    x="180"
    y="188"
    text-anchor="middle"
    font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
    font-size="25"
    font-weight="600"
    letter-spacing="0.06em"
    fill="#0B1220">
    RadarTips
  </text>
</svg>
