<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>RadarTips Debug Health</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: sans-serif; background: #222; color: #eee; margin: 0; padding: 2em; }
    h1 { font-size: 1.5em; margin-bottom: 0.5em; }
    .section { margin-bottom: 2em; }
    .events { background: #333; padding: 1em; border-radius: 8px; }
    .counts { margin-top: 1em; }
    button { margin-right: 1em; padding: 0.5em 1em; }
    .small { font-size: 0.9em; color: #aaa; }
  </style>
  <meta name="radartips-build" content="080f28b44a69">
</head>
<body>
  <h1>RadarTips Debug Health <span class="small">rt_telemetry</span></h1>
  <div class="section" id="meta"></div>
  <div class="section">
    <button onclick="RT_TEL.clear(); location.reload();">Limpar logs</button>
    <button onclick="exportJson()">Exportar JSON</button>
  </div>
  <div class="section events" id="events"></div>
  <script src="/assets/js/telemetry.js"></script>
  <script>
    function renderMeta(meta) {
      var html = '';
      if (meta) {
        if (meta.timestamp) html += '<div><b>Timestamp:</b> ' + meta.timestamp + '</div>';
        if (meta.git) html += '<div><b>Git commit:</b> ' + meta.git + '</div>';
        if (meta.bundles) html += '<div><b>Bundles:</b> ' + meta.bundles.join(', ') + '</div>';
      }
      document.getElementById('meta').innerHTML = html;
    }
    function renderEvents(data) {
      var html = '<b>Últimos eventos:</b><br><ul>';
      (data.events||[]).slice(-20).reverse().forEach(function(ev){
        html += '<li>' + ev.ts + ' <b>' + ev.type + '</b> <span class="small">' + ev.page + '</span>' + (ev.payload ? ' <span class="small">' + JSON.stringify(ev.payload) + '</span>' : '') + '</li>';
      });
      html += '</ul>';
      html += '<div class="counts"><b>Contadores:</b><br>' + Object.entries(data.counts||{}).map(function([k,v]){ return k+': '+v; }).join(', ') + '</div>';
      document.getElementById('events').innerHTML = html;
    }
    function exportJson() {
      var data = window.RT_TEL.get();
      var blob = new Blob([JSON.stringify(data)], {type:'application/json'});
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'radartips-telemetry.json';
      a.click();
    }
    // Carregar meta
    fetch('/assets/manifest.meta.json').then(function(r){
      if(r.ok) r.json().then(renderMeta);
    });
    // Carregar eventos
    setTimeout(function(){ renderEvents(window.RT_TEL.get()); }, 200);
  </script>
</body>
</html>
