<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RadarTips • Radar</title>
  <meta name="description" content="RadarTips: informational fixtures, quick suggestions and stats. Not a bookmaker. 18+." />
  <link rel="icon" href="/assets/favicon.svg" />
  <link rel="stylesheet" href="/assets/css/style.css?v=14" />
  <meta name="radartips-build" content="be771d37f402">
</head>
<body data-page="day" data-shell="day-v2" data-rt-surface="radar-day" data-theme="dark">
  <div class="rt-day">
    <header class="rt-header">
      <div class="rt-header-top">
        <div class="rt-brand-row">
          <span id="brand" class="rt-brand-text">RadarTips</span>
          <span class="badge-mini" id="disclaimer"></span>
        </div>
        <p class="mini rt-tagline" id="subtitle"></p>
      </div>
      <div class="rt-header-actions">
        <nav class="rt-nav-pills" aria-label="Vues Radar">
          <a class="pill" data-nav="day" href="#"></a>
          <a class="pill" data-nav="calendar" href="#"></a>
        </nav>
        <div class="rt-lang-tools">
          <button class="lang theme-toggle" id="theme_toggle" type="button" aria-label="Thème">☾</button>
          <span class="lang" data-lang="en">EN</span>
          <span class="lang" data-lang="pt">PT</span>
          <span class="lang" data-lang="es">ES</span>
          <span class="lang" data-lang="fr">FR</span>
          <span class="lang" data-lang="de">DE</span>
        </div>
      </div>
    </header>

    <main class="rt-main">
      <section class="rt-top3" aria-labelledby="top3_heading">
        <header class="rt-top3-head">
          <h2 id="top3_heading" class="rt-top3-title"></h2>
          <p id="top3_sub" class="rt-top3-sub"></p>
        </header>
        <div class="rt-top3-grid">
          <article class="rt-slot" data-slot="1">
            <div class="rt-slot-topbar"></div>
            <h3></h3>
            <div class="meta"></div>
            <div class="lock"></div>
          </article>
          <article class="rt-slot" data-slot="2">
            <div class="rt-slot-topbar"></div>
            <h3></h3>
            <div class="meta"></div>
            <div class="lock"></div>
          </article>
          <article class="rt-slot" data-slot="3">
            <div class="rt-slot-topbar"></div>
            <h3></h3>
            <div class="meta"></div>
            <div class="lock"></div>
          </article>
        </div>
      </section>

      <section class="section rt-cal rt-dayboard" id="calendar_section">
        <div id="dayboard_tabs" class="rt-day-tabs" role="tablist"></div>
        <div class="controls">
          <input class="input" id="search" type="search" autocomplete="off" />
        </div>
        <div class="rt-dayboard-split">
          <aside id="country_list" class="rt-country-list" aria-label="Pays"></aside>
          <div class="cal rt-dayboard-matches" id="calendar"></div>
        </div>
      </section>
    </main>

    <footer class="footer rt-footer"></footer>
  </div>

  <div id="modal_backdrop" class="rt-modal-backdrop" role="dialog" aria-modal="true">
    <div class="rt-modal">
      <div class="rt-modal-head">
        <div id="modal_title" class="rt-modal-title"></div>
        <button type="button" class="btn" id="modal_close">×</button>
      </div>
      <div id="modal_body" class="rt-modal-body"></div>
    </div>
  </div>

  <script src="/assets/js/app.be771d37f402.js"></script>
</body>
</html>
