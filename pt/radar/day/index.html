<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RadarTips - Radar</title>
  <meta name="description" content="RadarTips: informational fixtures, quick suggestions and stats. Not a bookmaker. 18+." />
  <link rel="icon" href="/assets/favicon.svg" />
  <link rel="stylesheet" href="/assets/css/style.css?v=8" />
</head>
<body data-page="day">
  <div class="container">
    <div class="topbar">
      <div class="brand">
        <div class="brandline">
          <div class="logo">
            <span id="brand">RadarTips</span>
            <span class="badge-mini" id="disclaimer">-</span>
          </div>
        </div>
        <div class="mini" id="subtitle"></div>
      </div>

      <div class="nav">
        <a class="pill" data-nav="day" href="#">-</a>
        <a class="pill" data-nav="week" href="#">-</a>
        <a class="pill" data-nav="calendar" href="#">-</a>

        <span style="width:10px"></span>

        <button class="lang theme-toggle" id="theme_toggle" type="button" aria-label="Theme">Dark</button>
        <span class="lang" data-lang="en">EN</span>
        <span class="lang" data-lang="pt">PT</span>
        <span class="lang" data-lang="es">ES</span>
        <span class="lang" data-lang="fr">FR</span>
        <span class="lang" data-lang="de">DE</span>
      </div>
    </div>

    <section class="rt-day-top">
      <div class="rt-day-top__head">
        <h1 id="hero_title">Radar do Dia</h1>
        <p id="hero_sub">As melhores oportunidades do dia</p>
      </div>
      <div class="rt-day-tabs" id="day_tabs"></div>
    </section>

    <section class="rt-day-picks" id="top3_section"></section>

    <section class="rt-day-leagues section" id="calendar_section"></section>

    <div class="footer">
      Copyright <span id="year"></span> RadarTips
    </div>
  </div>

  <div class="modal-backdrop" id="modal_backdrop" role="dialog" aria-modal="true">
    <div class="modal">
      <div class="modal-head">
        <div class="modal-title" id="modal_title">Radar</div>
        <button class="btn" id="modal_close" type="button">X</button>
      </div>
      <div class="modal-body" id="modal_body"></div>
    </div>
  </div>

  <script src="/assets/js/app.js?v=8"></script>
</body>
</html>
